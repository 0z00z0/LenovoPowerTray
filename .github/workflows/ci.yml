name: CI

# Build on every push and PR to main. Keeps the release path (release.yml) lean —
# this catches build regressions continuously, not only at release time.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      # The app targets win-x64 with ReadyToRun on Release, which needs the
      # win-x64 runtime pack — restore/build must specify the RID (NETSDK1112).
      - name: Restore
        run: dotnet restore LenovoTray.csproj -r win-x64

      - name: Build (Release)
        run: dotnet build LenovoTray.csproj -c Release -r win-x64 --no-restore --nologo
