<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept C: terminal mark with a ">0z0" prompt -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="cBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f1722"/>
      <stop offset="1" stop-color="#060a10"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#cBg)"/>
  <!-- terminal window -->
  <rect x="44" y="58" width="168" height="140" rx="20" fill="#0b1018" stroke="#1f2c3d" stroke-width="4"/>
  <!-- title bar dots -->
  <circle cx="68" cy="82" r="6" fill="#ff5f57"/>
  <circle cx="88" cy="82" r="6" fill="#febc2e"/>
  <circle cx="108" cy="82" r="6" fill="#28c840"/>
  <!-- prompt chevron -->
  <path d="M70 122 L92 142 L70 162" fill="none" stroke="#27e07a" stroke-width="11"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 0z0 text -->
  <text x="106" y="155" font-family="Consolas, 'Cascadia Code', monospace" font-size="46"
        font-weight="700" fill="#e8f1ff" letter-spacing="2">0z0</text>
  <!-- blinking cursor block -->
  <rect x="190" y="126" width="12" height="34" rx="2" fill="#27e07a"/>
</svg>
