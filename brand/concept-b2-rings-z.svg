<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept B2: "00" interlocking rings with a Z-shaped notch at the crossing -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="b2Bg" cx="0.5" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#15263a"/>
      <stop offset="1" stop-color="#0a0f17"/>
    </radialGradient>
    <linearGradient id="b2Ring1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27e0c8"/>
      <stop offset="1" stop-color="#11a9d6"/>
    </linearGradient>
    <linearGradient id="b2Ring2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7b8cff"/>
      <stop offset="1" stop-color="#3f5be0"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#b2Bg)"/>
  <!-- two interlocking zeros -->
  <circle cx="98"  cy="128" r="46" fill="none" stroke="url(#b2Ring1)" stroke-width="18"/>
  <circle cx="158" cy="128" r="46" fill="none" stroke="url(#b2Ring2)" stroke-width="18"/>
  <!-- Z-shaped notch carved in the overlap (background colour = reads as negative space) -->
  <path d="M110 104 H146 L110 152 H146" fill="none" stroke="#0a0f17"
        stroke-width="15" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
