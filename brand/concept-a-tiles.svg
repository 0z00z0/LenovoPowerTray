<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept A: "0z0" rounded-tile wordmark -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="aBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2433"/>
      <stop offset="1" stop-color="#0d121c"/>
    </linearGradient>
    <linearGradient id="aTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3aa0ff"/>
      <stop offset="1" stop-color="#1f6fe0"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#aBg)"/>
  <!-- three tiles: 0  z  0 -->
  <g fill="none" stroke="url(#aTile)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round">
    <!-- left zero -->
    <rect x="40" y="92" width="44" height="72" rx="22"/>
    <!-- right zero -->
    <rect x="172" y="92" width="44" height="72" rx="22"/>
  </g>
  <!-- center z -->
  <path d="M104 100 H152 L108 156 H152" fill="none" stroke="#e8f1ff" stroke-width="13"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
