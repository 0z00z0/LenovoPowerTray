<?xml version="1.0" encoding="UTF-8"?>
<!-- Concept B: "00" concentric / interlocking rings monogram -->
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <radialGradient id="bBg" cx="0.5" cy="0.35" r="0.85">
      <stop offset="0" stop-color="#15263a"/>
      <stop offset="1" stop-color="#0a0f17"/>
    </radialGradient>
    <linearGradient id="bRing1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27e0c8"/>
      <stop offset="1" stop-color="#11a9d6"/>
    </linearGradient>
    <linearGradient id="bRing2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7b8cff"/>
      <stop offset="1" stop-color="#3f5be0"/>
    </linearGradient>
  </defs>
  <rect x="8" y="8" width="240" height="240" rx="52" fill="url(#bBg)"/>
  <!-- two interlocking zeros -->
  <circle cx="98"  cy="128" r="46" fill="none" stroke="url(#bRing1)" stroke-width="18"/>
  <circle cx="158" cy="128" r="46" fill="none" stroke="url(#bRing2)" stroke-width="18"/>
  <!-- overlap accent -->
  <circle cx="128" cy="128" r="14" fill="#0a0f17"/>
</svg>
